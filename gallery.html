<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Gallery — AirBrush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background: var(--bg); min-height: 100vh; font-family: 'DM Sans', sans-serif; }

    /* ── NAV ── */
    .gallery-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 58px;
      background: rgba(7,7,15,0.97); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .gallery-nav .logo { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; }
    .logo-icon { width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--text-1); }
    .nav-right { display: flex; gap: 0.75rem; align-items: center; }
    .btn-nav { padding: 0.38rem 0.9rem; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2); font-size: 0.82rem; cursor: pointer;
      text-decoration: none; transition: var(--transition); }
    .btn-nav:hover { border-color: var(--border-glow); color: var(--text-1); }
    .btn-nav.primary { background: linear-gradient(135deg, var(--violet), var(--cyan));
      border: none; color: #fff; font-weight: 600; }

    /* ── PAGE ── */
    .gallery-page { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .gallery-header { margin-bottom: 2rem; }
    .gallery-header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
      color: var(--text-1); margin-bottom: 0.35rem; }
    .gallery-header p { color: var(--text-2); font-size: 0.92rem; }
    .gallery-meta { font-size: 0.8rem; color: var(--text-3); margin-top: 0.25rem; }

    .gallery-controls { display: flex; gap: 0.75rem; margin-bottom: 1.75rem; flex-wrap: wrap; align-items: center; }
    .btn-clear-gallery {
      padding: 0.42rem 1rem; border-radius: 8px; border: 1px solid rgba(239,68,68,.3);
      background: rgba(239,68,68,.07); color: #EF4444; font-size: 0.82rem;
      cursor: pointer; transition: var(--transition); font-family: 'DM Sans', sans-serif;
    }
    .btn-clear-gallery:hover { background: rgba(239,68,68,.15); }

    /* ── EMPTY STATE ── */
    .gallery-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 40vh; gap: 1rem; color: var(--text-3); text-align: center;
    }
    .gallery-empty-icon { font-size: 3.5rem; opacity: .35; }
    .gallery-empty h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; color: var(--text-2); }
    .gallery-empty p { font-size: 0.88rem; max-width: 340px; line-height: 1.6; }
    .gallery-empty a { color: var(--violet); text-decoration: none; font-weight: 600; }

    /* ── GRID ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    /* ── CARD ── */
    .gallery-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
    }
    .gallery-card:hover { border-color: var(--border-glow); transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,.4); }

    /* two-image row */
    .card-images { display: grid; grid-template-columns: 1fr 1fr; }
    .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #0d0d1a; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 0.65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      padding: 0.3rem 0.55rem; background: rgba(0,0,0,.65); color: var(--text-3);
    }

    .card-body { padding: 0.9rem 1rem; }
    .card-desc {
      font-size: 0.84rem; color: var(--text-2); line-height: 1.55;
      margin-bottom: 0.65rem; min-height: 1.2em;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-desc.empty { color: var(--text-3); font-style: italic; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-date { font-size: 0.72rem; color: var(--text-3); }
    .card-actions { display: flex; gap: 0.4rem; }
    .card-btn {
      padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2); font-size: 0.72rem;
      cursor: pointer; transition: var(--transition); font-family: 'DM Sans', sans-serif;
    }
    .card-btn:hover { border-color: var(--border-glow); color: var(--text-1); }
    .card-btn.del:hover { border-color: rgba(239,68,68,.4); color: #EF4444; background: rgba(239,68,68,.07); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #0e0e1c; border: 1px solid var(--border); border-radius: 18px;
      max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 1.75rem;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; color: var(--text-1); }
    .modal-close { background: transparent; border: 1px solid var(--border); color: var(--text-2);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .modal-close:hover { border-color: var(--border-glow); color: var(--text-1); }
    .modal-images { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .modal-img-wrap { border-radius: 12px; overflow: hidden; background: #0d0d1a; }
    .modal-img-wrap img { width: 100%; display: block; }
    .modal-img-label { font-size: 0.72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-3); padding: 0.45rem 0.7rem; background: rgba(0,0,0,.4); }
    .modal-desc { font-size: 0.9rem; color: var(--text-2); line-height: 1.65;
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1rem; }
    .modal-desc.empty { color: var(--text-3); font-style: italic; }
    .modal-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .modal-btn {
      padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,.04); color: var(--text-2); font-size: 0.82rem;
      cursor: pointer; transition: var(--transition); font-family: 'DM Sans', sans-serif; font-weight: 500;
    }
    .modal-btn:hover { border-color: var(--border-glow); color: var(--text-1); }
    .modal-btn.primary { background: linear-gradient(135deg,var(--violet),var(--cyan));
      border: none; color: #fff; }

    @media (max-width: 600px) {
      .card-images, .modal-images { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="gallery-nav">
    <a href="canvas.html" class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">AirBrush</span>
    </a>
    <div class="nav-right">
      <a href="canvas.html" class="btn-nav">← Back to Canvas</a>
      <a href="canvas.html" class="btn-nav primary">✨ New Drawing</a>
    </div>
  </nav>

  <div class="gallery-page">
    <div class="gallery-header">
      <h1>My Gallery</h1>
      <p>Your saved sketches, descriptions and AI-generated artwork.</p>
      <p class="gallery-meta" id="gallery-meta"></p>
    </div>

    <div class="gallery-controls" id="gallery-controls" style="display:none">
      <button class="btn-clear-gallery" id="btn-clear-all">🗑 Clear All</button>
    </div>

    <div id="gallery-empty" class="gallery-empty" style="display:none">
      <div class="gallery-empty-icon">🖼</div>
      <h2>No saved artwork yet</h2>
      <p>Draw something on the canvas, generate an AI image, then click <strong>Save to Gallery</strong> to keep it here.</p>
      <a href="canvas.html">→ Go to Canvas</a>
    </div>

    <div class="gallery-grid" id="gallery-grid"></div>
  </div>

  <!-- Modal for full view -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Artwork</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-images">
        <div class="modal-img-wrap">
          <div class="modal-img-label">Your Sketch</div>
          <img id="modal-sketch" src="" alt="Sketch"/>
        </div>
        <div class="modal-img-wrap">
          <div class="modal-img-label">AI Generated</div>
          <img id="modal-ai" src="" alt="AI Image"/>
        </div>
      </div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-dl-sketch">⬇ Download Sketch</button>
        <button class="modal-btn" id="modal-dl-ai">⬇ Download AI Art</button>
        <button class="modal-btn primary" onclick="document.getElementById('modal').classList.add('hidden')">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ── Load gallery from localStorage ──
    function loadGallery() {
      const session = JSON.parse(sessionStorage.getItem('airbrush_session') || 'null');
      const all     = JSON.parse(localStorage.getItem('airbrush_gallery') || '[]');
      // Show all entries (user may view on same device); filter by user if logged in
      const entries = session
        ? all.filter(e => !e.user || e.user === session.email || e.user === 'guest')
        : all;

      const grid     = document.getElementById('gallery-grid');
      const empty    = document.getElementById('gallery-empty');
      const controls = document.getElementById('gallery-controls');
      const meta     = document.getElementById('gallery-meta');

      grid.innerHTML = '';

      if (!entries.length) {
        empty.style.display    = 'flex';
        controls.style.display = 'none';
        meta.textContent       = '';
        return;
      }

      empty.style.display    = 'none';
      controls.style.display = 'flex';
      meta.textContent       = `${entries.length} saved artwork${entries.length !== 1 ? 's' : ''}`;

      entries.forEach(entry => {
        const card = buildCard(entry);
        grid.appendChild(card);
      });
    }

    function buildCard(entry) {
      const card = document.createElement('div');
      card.className = 'gallery-card';

      const date = new Date(entry.createdAt || entry.id);
      const dateStr = date.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

      const descHtml = entry.description
        ? `<div class="card-desc">${escHtml(entry.description)}</div>`
        : `<div class="card-desc empty">No description</div>`;

      card.innerHTML = `
        <div class="card-images">
          <div class="card-img-wrap">
            <img src="${entry.sketch}" alt="sketch" loading="lazy"/>
            <div class="card-img-label">Sketch</div>
          </div>
          <div class="card-img-wrap">
            <img src="${entry.aiImage}" alt="ai art" loading="lazy"/>
            <div class="card-img-label">AI Art</div>
          </div>
        </div>
        <div class="card-body">
          ${descHtml}
          <div class="card-footer">
            <span class="card-date">${dateStr}</span>
            <div class="card-actions">
              <button class="card-btn" data-id="${entry.id}" data-action="view">View</button>
              <button class="card-btn" data-id="${entry.id}" data-action="dl-sketch">↓ Sketch</button>
              <button class="card-btn" data-id="${entry.id}" data-action="dl-ai">↓ AI</button>
              <button class="card-btn del" data-id="${entry.id}" data-action="delete">🗑</button>
            </div>
          </div>
        </div>`;

      card.querySelectorAll('.card-btn').forEach(btn => {
        btn.addEventListener('click', () => handleCardAction(btn.dataset.action, entry.id));
      });

      return card;
    }

    function handleCardAction(action, id) {
      const all   = JSON.parse(localStorage.getItem('airbrush_gallery') || '[]');
      const entry = all.find(e => e.id == id);
      if (!entry) return;

      if (action === 'view') {
        openModal(entry);
      } else if (action === 'dl-sketch') {
        downloadDataUrl(entry.sketch, `airbrush-sketch-${id}.png`);
      } else if (action === 'dl-ai') {
        downloadUrl(entry.aiImage, `airbrush-ai-${id}.png`);
      } else if (action === 'delete') {
        if (!confirm('Delete this artwork?')) return;
        const updated = all.filter(e => e.id != id);
        localStorage.setItem('airbrush_gallery', JSON.stringify(updated));
        loadGallery();
      }
    }

    function openModal(entry) {
      const date = new Date(entry.createdAt || entry.id);
      document.getElementById('modal-title').textContent =
        date.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
      document.getElementById('modal-sketch').src = entry.sketch;
      document.getElementById('modal-ai').src     = entry.aiImage;
      const desc = document.getElementById('modal-desc');
      if (entry.description) {
        desc.textContent  = entry.description;
        desc.className    = 'modal-desc';
      } else {
        desc.textContent  = 'No description provided.';
        desc.className    = 'modal-desc empty';
      }
      document.getElementById('modal-dl-sketch').onclick = () => downloadDataUrl(entry.sketch, `airbrush-sketch-${entry.id}.png`);
      document.getElementById('modal-dl-ai').onclick     = () => downloadUrl(entry.aiImage, `airbrush-ai-${entry.id}.png`);
      document.getElementById('modal').classList.remove('hidden');
    }

    function downloadDataUrl(dataUrl, filename) {
      const a = document.createElement('a');
      a.href = dataUrl; a.download = filename; a.click();
    }
    function downloadUrl(url, filename) {
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.target = '_blank'; a.click();
    }
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Clear all
    document.getElementById('btn-clear-all').addEventListener('click', () => {
      if (!confirm('Delete all saved artwork? This cannot be undone.')) return;
      localStorage.removeItem('airbrush_gallery');
      loadGallery();
    });

    // Close modal
    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal').classList.add('hidden');
    });
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal'))
        document.getElementById('modal').classList.add('hidden');
    });

    loadGallery();
  </script>
</body>
</html>
